name: Deploy GitHub Pages

# Same pattern as kevinqy001/opm-tool-new:
# build static site -> GitHub Actions Pages -> https://kevinqy001.github.io/Qualitrol-Quoting-Automation/
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install openpyxl python-docx pypdf fastapi jinja2 python-multipart

      - name: Build static site
        run: python scripts/build_github_pages.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
