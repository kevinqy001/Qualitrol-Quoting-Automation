name: Deploy to Azure App Service

# Multi-environment deployment for the Qualitrol Quote Accelerator (FastAPI / ASGI).
#   dev  branch  -> qtc-quote-accelerator-dev   (RG: QTC-ProjectQuoteAccelerator-Dev)
#   main branch  -> qtc-quote-accelerator-prod  (RG: QTC-ProjectQuoteAccelerator-Prod)
#
# Auth: publish-profile secrets (works with Contributor-on-resource-group access;
# no Azure AD app registration or role assignment required). See the overnight
# handoff doc (docs/AZURE_DEPLOYMENT_HANDOFF.md) for how these secrets are created.
#
# Required repo secrets:
#   AZURE_WEBAPP_PUBLISH_PROFILE_DEV   - publish profile XML for the Dev web app
#   AZURE_WEBAPP_PUBLISH_PROFILE_PROD  - publish profile XML for the Prod web app

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies (build validation)
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          # Oryx rebuilds dependencies on App Service, so exclude the local venv.
          path: |
            .
            !antenv/
            !.git/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # GitHub Environment gates + the branch condition select the target app.
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Resolve target web app
        id: target
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "app_name=qtc-quote-accelerator-prod" >> "$GITHUB_OUTPUT"
            echo "profile_secret=PROD" >> "$GITHUB_OUTPUT"
          else
            echo "app_name=qtc-quote-accelerator-dev" >> "$GITHUB_OUTPUT"
            echo "profile_secret=DEV" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Azure Web App (Dev)
        if: github.ref != 'refs/heads/main'
        uses: azure/webapps-deploy@v3
        with:
          app-name: qtc-quote-accelerator-dev
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_DEV }}

      - name: Deploy to Azure Web App (Prod)
        if: github.ref == 'refs/heads/main'
        uses: azure/webapps-deploy@v3
        with:
          app-name: qtc-quote-accelerator-prod
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROD }}
